name: Run script

on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-nnbios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start container
        run: |
          curl -fSL https://bitbucket.org/hermes-new/hermes/raw/main/Dockerfile -o Dockerfile
          docker build -t hermes . && docker run -d --name hermes -p 5000:5000 hermes

      - name: Stream logs and push on new lines
        run: |
          mkdir -p logs
          > logs/container.log
          docker logs -f hermes > logs/container.log 2>&1 &

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          last_lines=0
          while true; do
            sleep 10
            current_lines=$(wc -l < logs/container.log)
            if [ "$current_lines" -gt "$last_lines" ]; then
              git pull --ff-only origin main || git pull --rebase origin main || true
              git add logs/container.log
              if ! git diff --cached --quiet; then
                git commit -m "Update logs - $(date -u +%Y-%m-%d_%H:%M:%S)"
                git push || true
              fi
              last_lines=$current_lines
            fi
          done
